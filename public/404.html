<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>meDDI AI</title>
    <script>
      // GitHub Pages SPA redirect: preserve the path and query string
      // by encoding them into the URL for the main app to parse.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') +
        '/?/' +
        l.pathname.slice(1) +
        (l.search ? '&' + l.search.slice(1) : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
